name: 发布到 GitHub Pages

# 打包后写入 master 分支的 docs/ 目录（peaceiris 不允许 master→master，故用 JamesIves）
# Settings → Pages：Deploy from a branch → master → /docs

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖并打包
        run: |
          npm ci
          npm run build

      - name: 发布到 master/docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          folder: dist
          target-folder: docs
          clean: false
          commit-message: deploy docs for GitHub Pages
