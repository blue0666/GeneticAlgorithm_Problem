name: 发布到 GitHub Pages

# 说明：本 workflow 会把 npm run build 的结果推到 gh-pages 分支。
# GitHub 网页上 Settings → Pages 请选择：
#   Source = Deploy from a branch
#   Branch = gh-pages，Folder = / (root)
# Settings → Actions → Workflow permissions 请选择 Read and write permissions

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# 需要写权限，才能把打包结果推到 gh-pages 分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖并打包
        run: |
          npm ci
          npm run build

      - name: 发布到 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
