name: 发布到 GitHub Pages

# 将 npm run build 的结果写入 master 分支的 docs/ 目录。
# Settings → Pages 请选择：Deploy from a branch → master → /docs
# Settings → Actions → Workflow permissions → Read and write permissions

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖并打包
        run: |
          npm ci
          npm run build

      - name: 发布到 master/docs
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: master
          destination_dir: docs
          keep_files: true
